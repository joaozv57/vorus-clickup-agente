name: Scheduler Vorus

on:
  schedule:
    # Todos os horários em UTC. Brasil = UTC-3 (mai-out).
    - cron: '0 11 * * 1-5'    # 08:00 BRT — manhã
    - cron: '0 17 * * 1-5'    # 14:00 BRT — tarde
    - cron: '30 20 * * 1-5'   # 17:30 BRT — pré-fechamento
    - cron: '0 21 * * 1-5'    # 18:00 BRT — fechamento
    - cron: '0 20 * * 5'      # 17:00 BRT — WBR prep (sextas)

  workflow_dispatch:
    inputs:
      job:
        description: 'Job para disparar manualmente'
        required: true
        type: choice
        options: [manha, tarde, pre-fechamento, fechamento, wbr-prep]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Determinar job
        id: job
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.job }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 11 * * 1-5" ]; then
            echo "name=manha" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 17 * * 1-5" ]; then
            echo "name=tarde" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 20 * * 1-5" ]; then
            echo "name=pre-fechamento" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            echo "name=fechamento" >> $GITHUB_OUTPUT
          else
            echo "name=wbr-prep" >> $GITHUB_OUTPUT
          fi

      - name: Executar job
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          ZAPI_INSTANCE: ${{ secrets.ZAPI_INSTANCE }}
          ZAPI_TOKEN: ${{ secrets.ZAPI_TOKEN }}
        run: python run_job.py ${{ steps.job.outputs.name }}
