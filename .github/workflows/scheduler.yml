name: Scheduler Vorus

on:
  schedule:
    # Todos os horários em UTC. Brasil = UTC-3 (maio-outubro).
    - cron: '0 14 * * 1'       # 11:00 BRT seg — kickoff semanal
    - cron: '30 14 * * 2-5'    # 11:30 BRT ter-sex — daily
    - cron: '0 19 * * 1-5'     # 16:00 BRT seg-sex — checkin
    - cron: '30 20 * * 1-4'    # 17:30 BRT seg-qui — pré-fechamento
    - cron: '0 21 * * 1-4'     # 18:00 BRT seg-qui — fechamento
    - cron: '0 20 * * 5'       # 17:00 BRT sex — WBR prep
    - cron: '0 21 * * 5'       # 18:00 BRT sex — retrospectiva
    - cron: '0/30 13-22 * * 1-5' # a cada 30 min das 10h-19h BRT — follow-up

  workflow_dispatch:
    inputs:
      job:
        description: 'Job para disparar manualmente'
        required: true
        type: choice
        options:
          - kickoff
          - daily
          - checkin
          - pre-fechamento
          - fechamento
          - wbr-prep
          - retrospectiva
          - followup

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Determinar job
        id: job
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.job }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 14 * * 1" ]; then
            echo "name=kickoff" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 14 * * 2-5" ]; then
            echo "name=daily" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 19 * * 1-5" ]; then
            echo "name=checkin" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 20 * * 1-4" ]; then
            echo "name=pre-fechamento" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-4" ]; then
            echo "name=fechamento" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 20 * * 5" ]; then
            echo "name=wbr-prep" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 5" ]; then
            echo "name=retrospectiva" >> $GITHUB_OUTPUT
          else
            echo "name=followup" >> $GITHUB_OUTPUT
          fi

      - name: Chamar Render
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_SECRET }}" \
            "${{ secrets.RENDER_URL }}/internal/job/${{ steps.job.outputs.name }}" \
            | tee /tmp/response.json
          cat /tmp/response.json | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if not r.get('ok'):
            print('ERRO:', r)
            sys.exit(1)
          print('Job disparado:', r.get('job'))
          "
